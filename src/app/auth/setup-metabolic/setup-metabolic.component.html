<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/setup-diet"></ion-back-button>
    </ion-buttons>
    <ion-title>Profile Setup (7/7)</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <h2>Select Biological Sex</h2>
      
      <div class="info-link" (click)="openMetabolicInfo()">
        <ion-icon name="information-circle-outline"></ion-icon>
        <span>Why do we ask this?</span>
      </div>

      <div class="options-list">
        <div 
          *ngFor="let o of metabolicOptions" 
          class="option-card" 
          [class.selected]="form.value.metabolicProfile === o.value"
          (click)="selectOption(o.value)"
        >
          {{ o.label }}
          
          <ion-icon *ngIf="form.value.metabolicProfile === o.value" name="checkmark-circle" slot="end"></ion-icon>
        </div>
      </div>

      <form [formGroup]="form" style="display: none;">
        <input formControlName="metabolicProfile">
      </form>
    </div>

    <div class="button-area">
      <ion-button fill="clear" (click)="skip()">Skip</ion-button>
      <ion-button [disabled]="form.invalid" (click)="next()">Finish</ion-button>
    </div>
  </div>
</ion-content>
