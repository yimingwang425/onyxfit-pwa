<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/welcome"></ion-back-button>
    </ion-buttons>
    <ion-title>Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <h2>Please Enter Your Email</h2>

      <form [formGroup]="form">
        <ion-item>
          <ion-input 
            formControlName="email" 
            type="email" 
            inputmode="email" 
            autocomplete="email"
            placeholder="name@example.com"
          ></ion-input>
        </ion-item>

        <div *ngIf="form.controls['email']?.invalid && form.controls['email']?.touched" class="error-text">
          <ion-text *ngIf="form.controls['email']?.errors?.['required']">Email address is required.</ion-text>
          <ion-text *ngIf="form.controls['email']?.errors?.['email']">Please enter a valid email address.</ion-text>
        </div>

        <div *ngIf="error" class="error-text">
          <ion-text>{{ error }}</ion-text>
        </div>
        
        <div *ngIf="loading" style="text-align:center; margin-top:12px">
          <ion-spinner name="crescent"></ion-spinner>
        </div>
      </form>
    </div>

    <div class="button-area">
      <ion-button expand="block" (click)="sendOtp()" [disabled]="loading || form.invalid">Next</ion-button>
    </div>
  </div>
</ion-content>
