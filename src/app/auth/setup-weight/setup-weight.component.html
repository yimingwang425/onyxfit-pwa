<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/setup-height"></ion-back-button>
    </ion-buttons>
    <ion-title>Profile Setup (3/7)</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <ion-label>
        <h2>What is your Weight? (kg)</h2>
      </ion-label>

      <form [formGroup]="form" (ngSubmit)="next()">
        <ion-item>
          <ion-input
            type="number"
            formControlName="weightKg"
            placeholder="e.g., 70"
          ></ion-input>
        </ion-item>
        <div *ngIf="form.controls.weightKg.invalid && form.controls.weightKg.touched" class="error-text">
          <ion-text color="danger">
            <small>Please enter a valid weight.</small>
          </ion-text>
        </div>
      </form>
    </div>

    <div class="button-area">
      <ion-button fill="clear" (click)="skip()">Skip</ion-button>
      <ion-button [disabled]="form.invalid" (click)="next()">Next</ion-button>
    </div>
  </div>
</ion-content>
