<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/password-reset-verify"></ion-back-button>
    </ion-buttons>
    <ion-title>Reset</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <h2>New Password</h2>
      
      <form [formGroup]="setPasswordForm" (ngSubmit)="submitNewPassword()">
        
        <ion-item>
          <ion-input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="New password"
            required
          ></ion-input>
          <ion-button fill="clear" (click)="toggleShowPassword()" slot="end">
            <ion-icon
              [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
              slot="icon-only"
              color="medium"
            ></ion-icon>
          </ion-button>
        </ion-item>

        <ion-item style="margin-top: 16px;">
          <ion-input
            formControlName="confirmPassword"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Confirm password"
            required
          ></ion-input>
        </ion-item>

        <div *ngIf="setPasswordForm.errors?.['mismatch'] && setPasswordForm.get('confirmPassword')?.touched" class="error-text">
          <p>Passwords do not match.</p>
        </div>
        <div *ngIf="setPasswordForm.get('password')?.hasError('minlength') && setPasswordForm.get('password')?.touched" class="error-text">
          <p>At least 8 characters required.</p>
        </div>
        <div *ngIf="errorMessage" class="error-text">
          <p>{{ errorMessage }}</p>
        </div>
      </form>
    </div>

    <div class="button-area">
      <ion-button
        expand="block"
        (click)="submitNewPassword()"
        [disabled]="setPasswordForm.invalid || isLoading"
      >
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">Update Password</span>
      </ion-button>
    </div>
  </div>

  <ion-alert
    header="Success"
    message="Your password has been reset."
    [buttons]="['Login']"
    [isOpen]="isSuccessAlertOpen"
    (didDismiss)="onSuccessAlertDismiss()"
  ></ion-alert>
</ion-content>
