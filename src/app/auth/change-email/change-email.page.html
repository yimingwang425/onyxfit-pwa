<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/settings"></ion-back-button>
    </ion-buttons>
    <ion-title>Change Email</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  
  <div class="wizard-container" *ngIf="step === 1">
    <div class="prompt-area">
      <h2>Enter New Email</h2>
      <form [formGroup]="formEmail" (ngSubmit)="sendOtp()">
        <ion-item>
          <ion-input 
            type="email" 
            formControlName="newEmail" 
            placeholder="e.g. new@example.com"
          ></ion-input>
        </ion-item>
      </form>
      
      <div class="note">We will send a one-time code to this email for verification.</div>
      
      <div *ngIf="error" class="error-text">{{ error }}</div>
    </div>

    <div class="button-area">
      <ion-button expand="block" (click)="sendOtp()" [disabled]="loading">
        <span *ngIf="!loading">Send code</span>
        <ion-spinner *ngIf="loading" slot="end"></ion-spinner>
      </ion-button>
    </div>
  </div>

  <div class="wizard-container" *ngIf="step === 2">
    <div class="prompt-area">
      <h2>Verify Email</h2>
      <form [formGroup]="formOtp" (ngSubmit)="verifyOtp()">
        <ion-item>
          <ion-input 
            type="text" 
            formControlName="otp" 
            maxlength="6" 
            placeholder="6-digit code"
          ></ion-input>
        </ion-item>
      </form>

      <div class="note">
        <span *ngIf="resendSeconds > 0">Resend available in {{ resendSeconds }}s</span>
        <span *ngIf="resendSeconds === 0"><a (click)="resend()" style="cursor:pointer; text-decoration:underline;">Resend code</a></span>
      </div>

      <div *ngIf="error" class="error-text">{{ error }}</div>
    </div>

    <div class="button-area">
      <ion-button expand="block" (click)="verifyOtp()" [disabled]="loading">
        <span *ngIf="!loading">Verify & save</span>
        <ion-spinner *ngIf="loading" slot="end"></ion-spinner>
      </ion-button>
      <ion-button expand="block" fill="clear" (click)="cancel()">Cancel</ion-button>
    </div>
  </div>

</ion-content>
