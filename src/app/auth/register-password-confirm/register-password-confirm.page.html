<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/register-password"></ion-back-button>
    </ion-buttons>
    <ion-title>Confirm</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <h2>Confirm Password</h2>

      <form [formGroup]="form">
        <ion-item>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            autocomplete="new-password"
            placeholder="Re-enter password"
          ></ion-input>

          <ion-button fill="clear" (click)="toggleShow()" slot="end">
             <ion-icon 
               [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" 
               slot="icon-only" 
               color="medium">
             </ion-icon>
          </ion-button>
        </ion-item>

        <div *ngIf="error" class="error-text">{{ error }}</div>
        
        <div *ngIf="loading" style="text-align:center; margin-top:12px">
          <ion-spinner name="crescent"></ion-spinner>
        </div>
      </form>
    </div>

    <div class="button-area">
      <ion-button expand="block" (click)="complete()" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">Complete Registration</span>
      </ion-button>
    </div>
  </div>
</ion-content>
