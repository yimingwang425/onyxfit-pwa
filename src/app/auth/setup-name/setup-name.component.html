<ion-header>
  <ion-toolbar>
    <ion-title>Profile Setup (1/8)</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <ion-label>
        <h2>What's your preferred name?</h2>
      </ion-label>

      <form [formGroup]="form" (ngSubmit)="next()">
        <ion-item>
          <ion-input
            type="text"
            formControlName="firstName"
            placeholder="e.g., Alex"
            autocapitalize="words"
          ></ion-input>
        </ion-item>
        <div *ngIf="form.controls.firstName.invalid && form.controls.firstName.touched" class="error-text">
          <ion-text color="danger">
            <small>Please enter your preferred name.</small>
          </ion-text>
        </div>
      </form>
    </div>

    <div class="button-area">
      <ion-button [disabled]="form.invalid" (click)="next()">Next</ion-button>
    </div>
  </div>
</ion-content>
