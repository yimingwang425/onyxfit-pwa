<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/password-reset-email"></ion-back-button>
    </ion-buttons>
    <ion-title>Verification</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <h2>Enter Verification Code</h2>
      <ion-text>
        <p style="color:#666; margin-bottom:24px;">
          We have sent a 6-digit verification code to <strong>{{ email }}</strong>.
        </p>
      </ion-text>

      <form (ngSubmit)="verifyOtp()">
        <ion-item>
          <ion-input
            [(ngModel)]="otp"
            name="otp"
            type="tel"
            inputmode="numeric"
            maxlength="6"
            placeholder="6-digit verification code"
            required
          ></ion-input>
        </ion-item>

        <div *ngIf="errorMessage" class="error-text">
          <p>{{ errorMessage }}</p>
        </div>
      </form>
    </div>

    <div class="button-area">
      <ion-button
        expand="block"
        (click)="verifyOtp()"
        [disabled]="!otp || otp.length < 6 || isLoading"
      >
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">Verify and proceed</span>
      </ion-button>
    </div>
  </div>
</ion-content>
