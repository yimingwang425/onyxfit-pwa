<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/register-verify"></ion-back-button>
    </ion-buttons>
    <ion-title>Set Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <h2>Create a Password</h2>

      <form [formGroup]="form">
        <ion-item>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="new-password"
            placeholder="At least 8 characters"
          ></ion-input>
          
          <ion-button fill="clear" (click)="toggleShow()" slot="end">
            <ion-icon 
              [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" 
              slot="icon-only" 
              color="medium">
            </ion-icon>
          </ion-button>
        </ion-item>

        <div *ngIf="error" class="error-text">{{ error }}</div>
      </form>
    </div>

    <div class="button-area">
      <ion-button expand="block" (click)="next()" [disabled]="form.invalid">Next</ion-button>
    </div>
  </div>
</ion-content>
