<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/setup-weight"></ion-back-button>
    </ion-buttons>
    <ion-title>Profile Setup (5/8)</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      <ion-label>
        <h2>What is your Activity Level?</h2>
      </ion-label>

      <div class="options-list">
        <div 
          *ngFor="let o of activityOptions" 
          class="option-card" 
          [class.selected]="form.value.activityLevel === o.value"
          (click)="selectOption(o.value)"
        >
          {{ o.label }}
          
          <ion-icon *ngIf="form.value.activityLevel === o.value" name="checkmark-circle" slot="end"></ion-icon>
        </div>
      </div>
      
      <form [formGroup]="form" style="display: none;">
        <input formControlName="activityLevel">
      </form>
      
    </div>

    <div class="button-area">
      <ion-button [disabled]="form.invalid" (click)="next()">Next</ion-button>
    </div>
  </div>
</ion-content>
