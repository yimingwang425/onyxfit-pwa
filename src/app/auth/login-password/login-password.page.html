<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/login-email"></ion-back-button>
    </ion-buttons>
    <ion-title>Log in</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      
      <h2>Please Enter Your Password</h2>

      <form [formGroup]="form">
        <ion-item>
          <ion-input 
            formControlName="password" 
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Password"
          ></ion-input>

          <ion-button fill="clear" (click)="toggleShowPassword()" slot="end">
            <ion-icon
              [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
              slot="icon-only"
              color="medium"
            ></ion-icon>
          </ion-button>
        </ion-item>

        <div class="forgot-link-container">
          <ion-button fill="clear" size="small" type="button" (click)="forgotPassword()">I forgot my password</ion-button>
        </div>

        <div *ngIf="error" class="error-text">{{ error }}</div>

        <div *ngIf="loading" style="text-align:center; margin-top:12px">
          <ion-spinner name="crescent"></ion-spinner>
        </div>
      </form>
    </div>

    <div class="button-area">
      <ion-button expand="block" (click)="login()" [disabled]="loading || form.invalid">Log in</ion-button>
    </div>
  </div>
</ion-content>
