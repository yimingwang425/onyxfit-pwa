<ion-content [fullscreen]="true">
  <div class="safe-area-wrapper">
    <div style="display:flex; justify-content:flex-start; align-items:flex-start; padding:0; margin:0;">
      <img src="assets/img/onyxfit-logo.png" alt="OnyxFit" style="height:90px; width:auto; display:block; margin:0 0 0 -25px; padding:0;" />
    </div>

    <div class="bottom-container">
      <div class="hero-text">
        <h1>Shape<br>Your<br>Future</h1>
        <p>Personalized workouts & meal plans driven by AI.</p>
      </div>

      <div class="actions">
        <ion-button expand="block" class="btn-primary" [routerLink]="['/auth/register-email']">
          Get Started
        </ion-button>
        
        <ion-button expand="block" fill="clear" class="btn-secondary" [routerLink]="['/auth/login-email']">
          I have an account
        </ion-button>
      </div>
    </div>

  </div>
</ion-content>
