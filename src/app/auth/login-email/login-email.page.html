<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/welcome"></ion-back-button>
    </ion-buttons>
    <ion-title>Log in</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wizard-container">
    <div class="prompt-area">
      
      <h2>Please Enter Your Email</h2>

      <form [formGroup]="form" (ngSubmit)="next()">
        <ion-item>
          <ion-input 
            formControlName="email" 
            type="email" 
            inputmode="email" 
            autocapitalize="off"
            placeholder="name@example.com"
          ></ion-input>
        </ion-item>
      </form>

      <div *ngIf="error" class="error-text">
        <ion-text color="danger">{{ error }}</ion-text>
      </div>

      <div *ngIf="loading" style="text-align:center; margin-top:12px">
        <ion-spinner name="crescent"></ion-spinner>
      </div>
    </div>

    <div class="button-area">
      <ion-button expand="block" (click)="next()" [disabled]="loading || form.invalid">Next</ion-button>
    </div>
  </div>
</ion-content>
