<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>{{ exercise?.name || 'Exercise' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon slot="icon-only" name="close-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="video-container" *ngIf="videoUrl">
    <video
      [src]="videoUrl"
      autoplay
      loop
      muted
      playsinline>
    </video>
  </div>

  <div class="content-body">

    <div class="stats-grid">
      <div class="stat-item">
        <span class="stat-value">{{ exercise?.sets || '-' }}</span>
        <span class="stat-label">SETS</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value">{{ exercise?.reps || '-' }}</span>
        <span class="stat-label">REPS</span>
      </div>
    </div>

    <div class="section-title">Target Muscle</div>
    <span class="tag-pill">{{ exercise?.targetMuscles }}</span>

    <div class="section-title" style="margin-top: 24px;">Key Points</div>
    <p class="notes-text">{{ exercise?.notes }}</p>

  </div>
</ion-content>
