<ion-header>
  <ion-toolbar>
    <ion-title>{{ exercise?.name || 'Exercise Details' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon slot="icon-only" name="close-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="video-container">
    <video
      *ngIf="videoUrl"
      [src]="videoUrl"
      autoplay
      loop
      muted
      playsinline>
    </video>
  </div>

  <div class="ion-padding">
    <ion-item lines="none" class="sets-reps">
      <ion-label>
        <h2>{{ exercise?.sets }} Sets</h2>
      </ion-label>
      <ion-label slot="end">
        <h2>{{ exercise?.reps }} Reps</h2>
      </ion-label>
    </ion-item>

    <ion-list-header>
      <ion-label>Target Muscle Group</ion-label>
    </ion-list-header>
    <ion-chip color="primary">{{ exercise?.targetMuscles }}</ion-chip>

    <ion-list-header>
      <ion-label>Key Points</ion-label>
    </ion-list-header>
    <ion-item lines="none">
      <ion-text class="notes-text">
        {{ exercise?.notes }}
      </ion-text>
    </ion-item>
  </div>
</ion-content>
