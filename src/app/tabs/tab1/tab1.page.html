<ion-content [fullscreen]="true">
  <div class="dashboard-container">
    
    <div class="header-section">
      <h2>{{ greeting }},</h2>
      <h1>{{ username }}</h1>
    </div>

    <div class="widget-card dark">
      <div class="widget-header">
        <ion-icon name="sparkles"></ion-icon>
        <span>AI Insight</span>
      </div>
      <p class="widget-content">{{ aiTip }}</p>
    </div>

    <div class="twin-cards">

      <div class="mini-card">
        <div class="mini-header">
          <ion-icon name="trending-up-outline"></ion-icon>
          <span>Weekly</span>
        </div>
        <div *ngIf="progressData.total > 0" class="mini-body">
          <span class="big-num">{{ progressData.completed }}<small>/{{ progressData.total }}</small></span>
          <span class="mini-label">workouts</span>
        </div>
        <div *ngIf="progressData.total === 0" class="mini-body empty">
          <ion-icon name="fitness-outline" class="empty-icon"></ion-icon>
          <span class="mini-label">Tap <strong>Eat</strong> or <strong>Train</strong></span>
        </div>
      </div>

      <div class="mini-card">
        <div class="mini-header">
          <ion-icon name="analytics-outline"></ion-icon>
          <span>Weight</span>
        </div>
        <div *ngIf="weightHistory.length > 0" class="mini-body">
          <canvas #sparklineCanvas class="sparkline-canvas"></canvas>
          <span class="big-num">{{ currentWeight }}<small>kg</small></span>
        </div>
        <div *ngIf="weightHistory.length === 0" class="mini-body empty">
          <ion-icon name="scale-outline" class="empty-icon"></ion-icon>
          <span class="mini-label">No data yet</span>
        </div>
      </div>

    </div>

    <div class="section-title">Track Today</div>

    <div class="track-grid">
      
      <div class="track-card" (click)="logMood()">
        <div class="track-top">
          <div class="track-icon mood">
            <ion-icon name="happy-outline"></ion-icon>
          </div>
          <button class="add-btn" (click)="$event.stopPropagation(); logMood()">
            <ion-icon name="add"></ion-icon>
          </button>
        </div>
        <span class="track-value" *ngIf="currentMood">{{ moodEmoji }} {{ currentMood }}</span>
        <span class="track-value placeholder" *ngIf="!currentMood">Not logged</span>
        <span class="track-label">Mood</span>
      </div>

      <div class="track-card" (click)="logWater()">
        <div class="track-top">
          <div class="track-icon water">
            <ion-icon name="water-outline"></ion-icon>
          </div>
          <button class="add-btn" (click)="$event.stopPropagation(); logWater()">
            <ion-icon name="add"></ion-icon>
          </button>
        </div>
        <span class="track-value">{{ currentWater }}<small> / 8</small></span>
        <div class="water-dots">
          <span *ngFor="let dot of waterDots; let i = index"
                class="dot" [class.filled]="i < currentWater"></span>
        </div>
        <span class="track-label">Glasses</span>
      </div>

    </div>

  </div>
</ion-content>
